name: RTL Simulation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sim:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run RTL simulation
        run: make sim
